<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>The Host - Versão Simples</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <nav class="navbar">
        <div class="logo-area">
            <img src="host.png" class="logo-img" alt="Logo">
            <span class="logo-texto">The Host</span>
        </div>
        <div class="menu">
            <a href="#">Capas</a>
            <a href="#">Apps</a>
            <div class="user-avatar"></div>
        </div>
    </nav>

    <main class="main-container">
        <section class="texto">
            <h1>Crie o seu próprio!</h1>
            <p>Por que se contentar com um celular genérico quando você pode criar um dispositivo que seja completamente seu?</p>
            <p>No <strong>The Host</strong>, você tem a liberdade de personalizar tudo, do hardware ao software.</p>
            <button class="btn-principal">Crie agora o seu</button>
        </section>

        <section class="visual">
            <img src="cd.png" class="cd-img" alt="Modelo CD">
            <div class="seletor">
                <span>◀</span>
                <strong>Modelo 1</strong>
                <span>▶</span>
            </div>
        </section>
    </main>

    <footer class="rodape">
        <p>&copy; 2026 The Host — Todos os direitos reservados.</p>
    </footer>

</body>
</html>
